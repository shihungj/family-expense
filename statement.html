<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>對帳單</title>
<style>
  :root {
    --radius: 16px;
    --shadow: 0 2px 12px rgba(0,0,0,.06);
    --orange: #FF8A3D;
    --green:  #22C58E;
    --purple: #7C6CFF;
    --gray-50:  #F9FAFB;
    --gray-100: #F3F4F6;
    --gray-200: #E5E7EB;
    --gray-400: #9CA3AF;
    --gray-500: #64748B;
    --gray-600: #475569;
    --gray-700: #374151;
    --gray-800: #1F2937;
    --accent: #FF8A3D;
    --accent-light: rgba(255,138,61,.15);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Noto Sans TC', 'Segoe UI', system-ui, sans-serif; background: #FAFBFC; color: var(--gray-800); min-height: 100vh; }

  /* ── Page wrapper ── */
  .page-wrap { max-width: 1088px; margin: 0 auto; padding: 1.5rem 2rem 3rem; }

  /* ── Header ── */
  .stmt-top {
    display: flex; align-items: center; justify-content: space-between;
    background: #fff; border-radius: var(--radius); box-shadow: var(--shadow);
    padding: 1.25rem 1.75rem; margin-bottom: 1.5rem;
  }
  .stmt-logo-area { display: flex; align-items: center; gap: 1rem; }
  .stmt-logo-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, #FF8A3D, #FFA05C);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .stmt-logo-title { font-size: 1rem; font-weight: 700; color: var(--gray-800); line-height: 1.4; }
  .stmt-logo-sub   { font-size: .75rem; color: var(--gray-400); }
  .stmt-heading-right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: .3rem; }
  .stmt-person-badge {
    display: inline-flex; align-items: center; gap: .4rem;
    padding: .35rem 1rem; border-radius: 999px;
    font-size: .875rem; font-weight: 700;
  }
  .stmt-month-label {
    font-size: .8rem; color: var(--gray-500);
    background: #F1F5F9; padding: .2rem .75rem; border-radius: 999px;
  }

  /* ── Cards ── */
  .card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 24px; margin-bottom: 1.25rem; }
  .section-title { font-size: 1rem; font-weight: 700; color: var(--gray-800); margin-bottom: 1rem; display: flex; align-items: center; gap: .5rem; }

  /* ── Summary ── */
  .summary-label  { font-size: .8rem; color: var(--gray-500); margin-bottom: .35rem; }
  .summary-amount { font-size: 1.75rem; font-weight: 700; line-height: 1.1; margin-bottom: 1.25rem; color: var(--orange); }
  .sub-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .85rem; }
  .sub-cell { border-radius: 12px; padding: 1rem 1.1rem; }
  .sub-cell-label { font-size: .72rem; font-weight: 600; margin-bottom: .35rem; opacity: .85; }
  .sub-cell-value { font-size: 1.1rem; font-weight: 800; }

  /* orange sub-cell */
  .sub-orange { background: #FFF5EC; }
  .sub-orange .sub-cell-label { color: #C05A1A; }
  .sub-orange .sub-cell-value { color: var(--orange); }

  /* green sub-cell */
  .sub-green { background: #E8FBF4; }
  .sub-green .sub-cell-label { color: #0F7A55; }
  .sub-green .sub-cell-value { color: var(--green); }

  /* purple sub-cell */
  .sub-purple { background: #F0EEFF; }
  .sub-purple .sub-cell-label { color: #4F3EBB; }
  .sub-purple .sub-cell-value { color: var(--purple); }

  /* ── Stat cards ── */
  .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: .85rem; margin-bottom: 1.25rem; }
  .stat-card { background: #fff; border-radius: var(--radius); box-shadow: var(--shadow); padding: 1.25rem 1rem; display: flex; align-items: center; gap: 1rem; }
  .stat-icon-wrap { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .stat-text { flex: 1; }
  .stat-label { font-size: .75rem; color: var(--gray-500); margin-bottom: .25rem; }
  .stat-value { font-size: 1.15rem; font-weight: 700; color: var(--gray-800); }

  /* ── Detail table ── */
  .detail-table { width: 100%; border-collapse: collapse; font-size: .875rem; }
  .detail-table thead th {
    background: #FFF7ED; padding: 12px 20px;
    text-align: left; font-weight: 600; color: var(--gray-600);
    border-bottom: 1px solid #EEF1F5;
  }
  .detail-table thead th:last-child { text-align: right; }
  .detail-table tbody tr:nth-child(even) { background: #FCFDFE; }
  .detail-table tbody tr:hover { background: #FFF8F3; }
  .detail-table tbody td { padding: 12px 20px; border-bottom: 1px solid #EEF1F5; }
  .detail-table tbody td:last-child { text-align: right; font-weight: 600; }
  .detail-table tfoot td { padding: 12px 20px; font-weight: 700; border-top: 2px solid #EEF1F5; background: #FFF7ED; }
  .table-wrap { border-radius: 12px; overflow: hidden; border: 1px solid #EEF1F5; }

  /* ── Password screen ── */
  #pwd-screen {
    display: flex; align-items: center; justify-content: center;
    min-height: 100vh; background: #FAFBFC;
  }
  .pwd-box {
    background: #fff; border-radius: 16px; border: 1px solid var(--gray-100);
    padding: 2.5rem 2rem; width: 90%; max-width: 380px;
    text-align: center; box-shadow: 0 4px 24px rgba(0,0,0,.08);
  }
  .pwd-icon  { margin-bottom: .75rem; }
  .pwd-title { font-size: 1.1rem; font-weight: 700; color: var(--gray-800); margin-bottom: .5rem; }
  .pwd-desc  { font-size: .875rem; color: var(--gray-400); margin-bottom: 1.25rem; line-height: 1.6; }
  .pwd-field {
    width: 100%; padding: .6rem .75rem; border: 1px solid var(--gray-200);
    border-radius: 8px; font-size: .9rem; outline: none;
    transition: border .15s, box-shadow .15s;
  }
  .pwd-field:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-light); }
  .pwd-err {
    background: #FEF2F2; color: #991B1B; border: 1px solid #FCA5A5;
    border-radius: 8px; padding: .45rem .65rem; font-size: .82rem;
    margin-top: .4rem; margin-bottom: .25rem;
  }
  .btn-confirm {
    width: 100%; margin-top: .65rem; padding: .6rem 1rem;
    border: none; border-radius: 8px; cursor: pointer;
    font-size: .9rem; font-weight: 700; color: #fff;
    background: var(--accent);
    transition: opacity .15s;
  }
  .btn-confirm:hover:not(:disabled) { opacity: .87; }
  .btn-confirm:disabled { opacity: .5; cursor: not-allowed; }

  /* ── Loading ── */
  .loading { text-align: center; padding: 3rem; color: var(--gray-400); }
  .spinner { display: inline-block; width: 28px; height: 28px; border: 3px solid var(--gray-200); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Person badge ── */
  .sh-badge { background: #FFF0E6; color: #C05A1A; }
  .hf-badge { background: #F0EEFF; color: #4F3EBB; }

  /* ── Mobile card list (hidden on desktop) ── */
  .mobile-list { display: none; }

  /* ── Mobile ── */
  @media (max-width: 768px) {
    .page-wrap { padding: 1rem 16px 2rem; }

    /* Header */
    .stmt-top { flex-direction: column; align-items: flex-start; gap: .75rem; padding: 1rem; }
    .stmt-heading-right { align-items: flex-start; flex-direction: row; gap: .5rem; flex-wrap: wrap; }

    /* Card */
    .card { padding: 16px; }

    /* Summary */
    .summary-amount { font-size: 1.25rem; }
    .sub-grid { grid-template-columns: 1fr; gap: .6rem; }
    .sub-cell { padding: .7rem .9rem; }
    .sub-cell-label { font-size: .7rem; }
    .sub-cell-value { font-size: 1.25rem; }

    /* Stat grid */
    .stat-grid { grid-template-columns: 1fr; gap: .6rem; }
    .stat-icon-wrap { width: 32px; height: 32px; }
    .stat-icon-wrap svg { width: 16px; height: 16px; }
    .stat-value { font-size: 1rem; }

    /* Toggle table/cards */
    .table-wrap { display: none; }
    .mobile-list { display: flex; flex-direction: column; gap: 8px; }

    /* Transaction card */
    .tx-card {
      background: #FFFFFF; border: 1px solid #EEF1F5;
      border-radius: 8px; padding: 12px 14px;
    }
    .tx-card-row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
    .tx-date  { font-size: .8rem; color: var(--gray-500); }
    .tx-amount { font-size: .9rem; font-weight: 700; color: var(--gray-800); }
    .tx-detail { font-size: .875rem; color: var(--gray-800); margin-bottom: 3px; }
    .tx-bank  { font-size: .75rem; color: #64748B; }

    /* Mobile subtotal row */
    .mobile-foot {
      display: flex; justify-content: flex-end; align-items: center; gap: .5rem;
      padding: 10px 4px 2px; border-top: 1px solid #EEF1F5; margin-top: 4px;
    }
    .mobile-foot-label { font-size: .8rem; color: var(--gray-600); font-weight: 600; }
    .mobile-foot-value { font-size: .95rem; font-weight: 800; }
  }

  @media print {
    #pwd-screen { display: none !important; }
    body { background: #fff !important; }
    .page-wrap { padding: 0; max-width: 100%; }
    .card { box-shadow: none !important; border: 1px solid #E5E7EB !important; break-inside: avoid; }
    .table-wrap { box-shadow: none !important; }
    * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
  }
</style>
</head>
<body>

<!-- ── Password screen ── -->
<div id="pwd-screen">
  <div class="pwd-box">
    <div class="pwd-icon">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#FF8A3D" stroke-width="1.8">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0110 0v4"/>
      </svg>
    </div>
    <div class="pwd-title">對帳單受密碼保護</div>
    <div class="pwd-desc" id="pwd-desc">請輸入密碼以查看對帳單內容</div>
    <input type="password" id="pwd-input" class="pwd-field" placeholder="請輸入對帳單密碼"
           onkeydown="if(event.key==='Enter')doVerifyPwd()">
    <div id="pwd-err" class="pwd-err" style="display:none">密碼錯誤，請再試一次</div>
    <button class="btn-confirm" id="pwd-btn" onclick="doVerifyPwd()">確認</button>
  </div>
</div>

<!-- ── Statement content ── -->
<div id="stmt-content" style="display:none">
  <div class="page-wrap">

    <!-- 頁首 -->
    <div class="stmt-top">
      <div class="stmt-logo-area">
        <div class="stmt-logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9.5L12 3l9 6.5V20a1 1 0 01-1 1H4a1 1 0 01-1-1V9.5z"/>
            <path d="M9 21V12h6v9"/>
          </svg>
        </div>
        <div>
          <div class="stmt-logo-title">家庭每月支出明細系統</div>
          <div class="stmt-logo-sub" id="logo-sub">個人帳戶</div>
        </div>
      </div>
      <div class="stmt-heading-right">
        <div class="stmt-person-badge" id="person-badge">—</div>
        <div class="stmt-month-label" id="month-label">—</div>
      </div>
    </div>

    <!-- Loading placeholder -->
    <div id="content-area">
      <div class="loading"><div class="spinner"></div></div>
    </div>

  </div>
</div>

<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwRHKwFTg5tvS7meM6DvFrZjGsdN7-9LXJ-sUP3hzgWE8ILaRG7PcUWu1sN6WbyxNc7rg/exec';
const API_KEY = atob('ZmFtaWx5LWV4cGVuc2UtMjAyNg==');

const params = new URLSearchParams(location.search);
const MONTH  = params.get('month') || '';
const PERSON = params.get('person') || 'shihong';
const IS_SH  = PERSON === 'shihong';
const SESS_KEY = 'stmtPwdVerified';

(async () => {
  if (!MONTH) {
    document.getElementById('pwd-desc').textContent = '連結格式錯誤：缺少帳單月份';
    document.getElementById('pwd-btn').disabled = true;
    document.querySelector('.pwd-title').textContent = '連結無效';
    return;
  }
  if (sessionStorage.getItem(SESS_KEY) === '1') {
    showStatement();
    return;
  }
  document.getElementById('pwd-input').focus();
})();

async function gasApi(action, body = null) {
  const url = new URL(GAS_URL);
  url.searchParams.set('action', action);
  url.searchParams.set('apiKey', API_KEY);
  const opts = body
    ? { method: 'POST', body: JSON.stringify({ action, apiKey: API_KEY, ...body }) }
    : { method: 'GET' };
  const res  = await fetch(url.toString(), opts);
  const json = await res.json();
  if (json.error) throw new Error(json.error);
  return json;
}

function fmt(n) {
  return 'NT$ ' + Math.round(n).toLocaleString();
}

async function doVerifyPwd() {
  const input = document.getElementById('pwd-input');
  const errEl = document.getElementById('pwd-err');
  const btn   = document.getElementById('pwd-btn');
  const pwd   = input.value;
  errEl.style.display = 'none';
  if (!pwd) { errEl.textContent = '請輸入密碼'; errEl.style.display = ''; return; }
  btn.disabled = true;
  btn.textContent = '驗證中…';
  try {
    const res = await gasApi('verifyStatementPassword', { password: pwd });
    if (res.success) {
      sessionStorage.setItem(SESS_KEY, '1');
      showStatement();
    } else {
      errEl.textContent = '密碼錯誤，請再試一次';
      errEl.style.display = '';
      input.value = '';
      input.focus();
    }
  } catch(e) {
    errEl.textContent = '驗證失敗，請稍後再試';
    errEl.style.display = '';
  } finally {
    btn.disabled = false;
    btn.textContent = '確認';
  }
}

async function showStatement() {
  document.getElementById('pwd-screen').style.display = 'none';
  document.getElementById('stmt-content').style.display = '';

  const name     = IS_SH ? '世鴻' : '慧鳳';
  const badgeCls = IS_SH ? 'sh-badge' : 'hf-badge';

  document.getElementById('logo-sub').textContent = name + ' 個人帳戶';
  document.getElementById('person-badge').textContent = name + ' 對帳單';
  document.getElementById('person-badge').className = 'stmt-person-badge ' + badgeCls;
  document.getElementById('month-label').textContent = MONTH + ' 帳單';

  try {
    const data = await gasApi('getTransactions');
    const allTx = data.transactions || [];
    const monthTx = allTx.filter(r => r.billingMonth === MONTH);
    renderContent(monthTx, name);
  } catch(e) {
    document.getElementById('content-area').innerHTML =
      '<div class="loading" style="color:#EF4444">載入失敗：' + e.message + '</div>';
  }
}

function renderContent(monthTx, name) {
  const attrKey    = IS_SH ? '世鴻應付' : '慧鳳應付';
  const personalTx = monthTx.filter(r => r.attribution === attrKey);
  const commonTx   = monthTx.filter(r => r.attribution === '共同支付');
  const personalSum = personalTx.reduce((s, r) => s + (parseFloat(r.amount) || 0), 0);
  const commonSum   = commonTx.reduce((s,   r) => s + (parseFloat(r.amount) || 0), 0);
  const myShare     = IS_SH ? Math.ceil(commonSum / 2) : Math.floor(commonSum / 2);
  const totalDue    = personalSum + myShare;

  const personalMax = personalTx.length
    ? Math.max(...personalTx.map(r => parseFloat(r.amount) || 0)) : 0;

  const bankCounts = {};
  monthTx.forEach(r => { bankCounts[r.bank] = (bankCounts[r.bank] || 0) + 1; });
  const topBank = Object.entries(bankCounts).sort((a, b) => b[1] - a[1])[0];
  const splitLabel = `個人分攤 50%（${IS_SH ? '無條件進位' : '無條件捨去'}）`;

  /* ── SVG icons ── */
  const svgDoc = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14,2 14,8 20,8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`;
  const svgList = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="3" cy="6" r="1" fill="currentColor" stroke="none"/><circle cx="3" cy="12" r="1" fill="currentColor" stroke="none"/><circle cx="3" cy="18" r="1" fill="currentColor" stroke="none"/></svg>`;
  const svgShared = `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>`;

  /* stat card icons with coloured circle backgrounds */
  const iconCart  = `<div class="stat-icon-wrap" style="background:#FFF0E6"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FF8A3D" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 001.98 1.61h9.72a2 2 0 001.98-1.69l1.38-7.31H6"/></svg></div>`;
  const iconTrend = `<div class="stat-icon-wrap" style="background:#E8FBF4"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#22C58E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="22,7 13.5,15.5 8.5,10.5 2,17"/><polyline points="16,7 22,7 22,13"/></svg></div>`;
  const iconBank  = `<div class="stat-icon-wrap" style="background:#F0EEFF"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#7C6CFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="22" x2="21" y2="22"/><line x1="6" y1="18" x2="6" y2="11"/><line x1="10" y1="18" x2="10" y2="11"/><line x1="14" y1="18" x2="14" y2="11"/><line x1="18" y1="18" x2="18" y2="11"/><polygon points="12,2 2,7 22,7"/></svg></div>`;

  document.getElementById('content-area').innerHTML = `
    <!-- 應繳摘要 -->
    <div class="card">
      <div class="section-title">${svgDoc} 應繳摘要</div>
      <div class="summary-label">${name} 本期應付總金額</div>
      <div class="summary-amount">${fmt(totalDue)}</div>
      <div class="sub-grid">
        <div class="sub-cell sub-orange">
          <div class="sub-cell-label">${name} 自付金額</div>
          <div class="sub-cell-value">${fmt(personalSum)}</div>
        </div>
        <div class="sub-cell sub-green">
          <div class="sub-cell-label">共同支付原始總額</div>
          <div class="sub-cell-value">${fmt(commonSum)}</div>
        </div>
        <div class="sub-cell sub-purple">
          <div class="sub-cell-label">${splitLabel}</div>
          <div class="sub-cell-value">${fmt(myShare)}</div>
        </div>
      </div>
    </div>

    <!-- 消費統計 -->
    <div class="stat-grid">
      <div class="stat-card">
        ${iconCart}
        <div class="stat-text">
          <div class="stat-label">自付消費筆數</div>
          <div class="stat-value">${personalTx.length} 筆</div>
        </div>
      </div>
      <div class="stat-card">
        ${iconTrend}
        <div class="stat-text">
          <div class="stat-label">最高單筆金額</div>
          <div class="stat-value">${personalTx.length ? fmt(personalMax) : '—'}</div>
        </div>
      </div>
      <div class="stat-card">
        ${iconBank}
        <div class="stat-text">
          <div class="stat-label">消費最多銀行</div>
          <div class="stat-value" style="font-size:1rem">${topBank ? topBank[0] : '—'}</div>
        </div>
      </div>
    </div>

    <!-- 自付明細 -->
    <div class="card">
      <div class="section-title">${svgList} ${name} 自付明細</div>
      <div class="table-wrap">${buildDesktopTable(personalTx, '自付小計', personalSum, null, null, '#FF8A3D')}</div>
      ${buildMobileList(personalTx, '自付小計', personalSum, null, null, '#FF8A3D')}
    </div>

    <!-- 共同支付明細 -->
    <div class="card">
      <div class="section-title">${svgShared} 共同支付明細</div>
      <div class="table-wrap">${buildDesktopTable(commonTx, '共同支付小計', commonSum, splitLabel, myShare, '#7C6CFF', '#22C58E')}</div>
      ${buildMobileList(commonTx, '共同支付小計', commonSum, splitLabel, myShare, '#7C6CFF', '#22C58E')}
    </div>`;
}

function buildDesktopTable(rows, sub1Label, sub1Amt, sub2Label, sub2Amt, sub1Color, sub2Color) {
  if (!rows.length) {
    return '<div style="padding:1.5rem;text-align:center;color:var(--gray-400);font-size:.875rem">本期無資料</div>';
  }
  const body = rows.map(r => `<tr>
    <td>${r.date}</td>
    <td>${r.bank}</td>
    <td>${r.detail}</td>
    <td>NT$ ${Number(parseFloat(r.amount)||0).toLocaleString()}</td>
  </tr>`).join('');

  let foot = `<tr>
    <td colspan="3" style="text-align:right">${sub1Label}</td>
    <td style="text-align:right;color:${sub1Color}">${fmt(sub1Amt)}</td>
  </tr>`;
  if (sub2Label) {
    const c = sub2Color || sub1Color;
    foot += `<tr>
      <td colspan="3" style="text-align:right">${sub2Label}</td>
      <td style="text-align:right;font-weight:800;font-size:.95rem;color:${c}">${fmt(sub2Amt)}</td>
    </tr>`;
  }
  return `<table class="detail-table">
    <thead><tr>
      <th>消費日</th><th>銀行</th><th>消費明細</th>
      <th>金額</th>
    </tr></thead>
    <tbody>${body}</tbody>
    <tfoot>${foot}</tfoot>
  </table>`;
}

function buildMobileList(rows, sub1Label, sub1Amt, sub2Label, sub2Amt, sub1Color, sub2Color) {
  if (!rows.length) {
    return '<div class="mobile-list" style="padding:.75rem 0;text-align:center;color:var(--gray-400);font-size:.875rem">本期無資料</div>';
  }
  const cards = rows.map(r => `
    <div class="tx-card">
      <div class="tx-card-row1">
        <span class="tx-date">${r.date}</span>
        <span class="tx-amount">NT$ ${Number(parseFloat(r.amount)||0).toLocaleString()}</span>
      </div>
      <div class="tx-detail">${r.detail}</div>
      <div class="tx-bank">${r.bank}</div>
    </div>`).join('');

  let footer = `
    <div class="mobile-foot">
      <span class="mobile-foot-label">${sub1Label}</span>
      <span class="mobile-foot-value" style="color:${sub1Color}">${fmt(sub1Amt)}</span>
    </div>`;
  if (sub2Label) {
    const c = sub2Color || sub1Color;
    footer += `
    <div class="mobile-foot">
      <span class="mobile-foot-label">${sub2Label}</span>
      <span class="mobile-foot-value" style="color:${c}">${fmt(sub2Amt)}</span>
    </div>`;
  }
  return `<div class="mobile-list">${cards}${footer}</div>`;
}
</script>
</body>
</html>
